services:
  db:
    image: postgres:16
    container_name: akbil-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: akbil-sis
      POSTGRES_PASSWORD: akbil-sis
      POSTGRES_DB: akbilms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akbil -d akbil"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: