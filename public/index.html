<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnavutköy Akbil — Giriş</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-brand">
      <img src="assets/logo.png" alt="" class="auth-crest" />
      <h1>Arnavutköy Akbil</h1>
      <p>
        Toplu ulaşım kartınızı, yolculuk geçmişinizi ve hatların yoğunluk
        saatlerini tek yerden görün.
      </p>
      <ul class="auth-points">
        <li>Kart bilgileriniz ve favori hatlarınız</li>
        <li>Tüm hatların saat saat yoğunluğu</li>
        <li>Mobil uygulamayla aynı hesap</li>
      </ul>
    </section>

    <section class="auth-panel">
      <div class="auth-tabs" role="tablist">
        <button id="tabLogin" class="auth-tab is-active" role="tab" aria-selected="true">
          Giriş Yap
        </button>
        <button id="tabRegister" class="auth-tab" role="tab" aria-selected="false">
          Kayıt Ol
        </button>
      </div>

      <p id="authMessage" class="auth-message" hidden></p>

      <form id="loginForm" class="auth-form">
        <label class="field">
          <span>E-posta</span>
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span>Şifre</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn-primary">Giriş Yap</button>
      </form>

      <form id="registerForm" class="auth-form" hidden>
        <label class="field">
          <span>Ad Soyad</span>
          <input type="text" name="full_name" autocomplete="name" minlength="2" required />
        </label>
        <label class="field">
          <span>E-posta</span>
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span>Şifre</span>
          <input type="password" name="password" autocomplete="new-password" minlength="8" required />
          <small>En az 8 karakter.</small>
        </label>
        <button type="submit" class="btn-primary">Hesap Oluştur</button>
      </form>

      <p class="auth-footnote">Arnavutköy Belediyesi — Akbil Simülasyon Projesi</p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script>
    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const message = document.getElementById("authMessage");

    function showMessage(text, tone) {
      message.textContent = text;
      message.className = `auth-message ${tone}`;
      message.hidden = false;
    }

    function clearMessage() {
      message.hidden = true;
    }

    function selectTab(isLogin) {
      tabLogin.classList.toggle("is-active", isLogin);
      tabRegister.classList.toggle("is-active", !isLogin);
      tabLogin.setAttribute("aria-selected", String(isLogin));
      tabRegister.setAttribute("aria-selected", String(!isLogin));
      loginForm.hidden = !isLogin;
      registerForm.hidden = isLogin;
      clearMessage();
    }

    tabLogin.addEventListener("click", () => selectTab(true));
    tabRegister.addEventListener("click", () => selectTab(false));

    /** Gönderim sırasında düğme kilitlenir — çift kayıt/çift giriş olmasın */
    async function submit(form, action) {
      const button = form.querySelector("button[type=submit]");
      const original = button.textContent;
      button.disabled = true;
      button.textContent = "Lütfen bekleyin…";
      try {
        await action(Object.fromEntries(new FormData(form)));
      } catch (err) {
        showMessage(err.message, "error");
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      clearMessage();
      submit(loginForm, async (data) => {
        await api.login(data.email, data.password);
        location.href = "panel.html";
      });
    });

    registerForm.addEventListener("submit", (event) => {
      event.preventDefault();
      clearMessage();
      submit(registerForm, async (data) => {
        await api.register(data.full_name, data.email, data.password);
        // Kayıt sonrası doğrudan içeri al — kullanıcı bilgilerini bir daha yazmasın
        await api.login(data.email, data.password);
        location.href = "panel.html";
      });
    });
  </script>
</body>
</html>
